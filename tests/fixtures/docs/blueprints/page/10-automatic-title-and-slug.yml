# Source: https://getkirby.com/docs/reference/panel/blueprints/page#page-creation-dialog__automatic-title-and-slug
# Source file: https://raw.githubusercontent.com/getkirby/getkirby.com/main/content/docs/2_reference/3_panel/1_blueprints/0_page/reference-article.txt
blueprint: page
create:
  title: '{{ page.location }} – {{ page.date.toDate(''M Y'') }}'
  slug: '{{ page.location.slug }}-{{ page.date.toDate(''Y-m-d'') }}'
  fields:
    - location
    - date
