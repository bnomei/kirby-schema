# Source: https://getkirby.com/docs/guide/blueprints/layout#columns__adding-fields-and-sections-to-columns
# Source file: https://raw.githubusercontent.com/getkirby/getkirby.com/main/content/docs/1_guide/7_blueprints/1_layout/guide.txt
blueprint: page
title: My blueprint
columns:
  - width: 2/3
    fields:
      subtitle:
        type: text
      blocks:
        type: blocks
  - width: 1/3
    fields:
      published:
        type: date
      author:
        type: users
        max: 1
