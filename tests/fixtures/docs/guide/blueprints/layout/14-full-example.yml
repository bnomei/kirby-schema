# Source: https://getkirby.com/docs/guide/blueprints/layout#tabs__full-example
# Source file: https://raw.githubusercontent.com/getkirby/getkirby.com/main/content/docs/1_guide/7_blueprints/1_layout/guide.txt
blueprint: page
title: My blueprint
tabs:
  content:
    label: Content
    icon: text
    columns:
      main:
        width: 2/3
        sections:
          content:
            type: fields
            fields:
              headline:
                label: Headline
                type: text
              text:
                label: Text
                type: textarea
      sidebar:
        width: 1/3
        sections:
          pages:
            type: pages
            label: Subpages
          files:
            type: files
            label: Files
  seo:
    label: SEO
    icon: search
    fields:
      seoTitle:
        label: SEO Title
        type: text
      seoDescription:
        label: SEO Description
        type: text
