blueprint: page
title: Album
icon: 🖼
status:
  draft: true
  listed: true
columns:
  - width: 1/3
    fields:
      cover: fields/cover
      headline:
        type: text
        placeholder: '{{ page.title }}'
        help: Leave empty to use the title as headline
      subheadline:
        type: text
      text:
        type: writer
      tags: true
  - width: 2/3
    sections:
      images:
        type: files
        layout: cards
        template: image
        info: '{{ file.dimensions }}'
        image:
          ratio: 5/4
          cover: true
        min: 1
        size: small
