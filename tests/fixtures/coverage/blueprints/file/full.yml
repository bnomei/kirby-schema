# Covers: #/$defs/blueprints/file
blueprint: file
title:
  en: Title
  de: Title DE
extends: fields/base
accept: true
create:
  width: 1200
  height: 1200
  crop: true
image:
  back: blue-200
  icon: image
focus: true
options:
  changeSlug:
    admin: true
  changeStatus: true
  changeTemplate:
    - article
    - note
  changeTitle:
    admin: true
  delete: false
  duplicate:
    admin: true
  preview: /preview
  read: true
  update:
    editor: true
  changeName:
    admin: true
  replace: false
buttons:
  - preview
  - '-'
  - icon: open
    text:
      en: Open
      de: Oeffnen
    link: /panel/site
fields:
  text:
    type: text
    label:
      en: Text
      de: Text DE
  toggle:
    type: toggle
    text:
      - 'Off'
      - 'On'
sections:
  content:
    type: fields
    fields:
      text:
        type: text
  info:
    type: info
    text: Section info
columns:
  main:
    width: 2/3
    fields:
      text:
        type: text
  sidebar:
    width: 1/3
    sections:
      info:
        type: info
        text: Info
tabs:
  content:
    label:
      en: Content
      de: Content DE
    fields:
      text:
        type: text
  seo:
    icon: search
    sections:
      meta:
        type: fields
        fields:
          description:
            type: textarea
