# Covers: #/$defs/blueprints/user
blueprint: user
title:
  en: Translated
  de: Translated DE
description:
  en: Translated
  de: Translated DE
extends: fields/base
options:
  changeSlug:
    admin: true
  changeStatus: true
  changeTemplate:
    - article
    - note
  changeTitle:
    admin: true
  delete: false
  duplicate:
    admin: true
  preview: /preview
  read: true
  update:
    editor: true
  changeName:
    admin: true
  replace: false
home: /panel/site
image:
  back: blue-200
  icon: image
permissions:
  access:
    panel: true
  files: true
  pages:
    create: true
  site: true
  users: false
  user:
    changeRole: false
buttons:
  - preview
  - '-'
  - icon: open
    text:
      en: Open
      de: Oeffnen
    link: /panel/site
fields:
  text:
    type: text
    label:
      en: Text
      de: Text DE
  toggle:
    type: toggle
    text:
      - 'Off'
      - 'On'
sections:
  content:
    type: fields
    fields:
      text:
        type: text
  info:
    type: info
    text: Section info
columns:
  main:
    width: 2/3
    fields:
      text:
        type: text
  sidebar:
    width: 1/3
    sections:
      info:
        type: info
        text: Info
tabs:
  content:
    label:
      en: Content
      de: Content DE
    fields:
      text:
        type: text
  seo:
    icon: search
    sections:
      meta:
        type: fields
        fields:
          description:
            type: textarea
